<!-- SHARED BASE STYLES — included via Jinja2 in every template -->
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500&display=swap" rel="stylesheet" />
<style>
  :root {
    --bg:          #0d0d0d;
    --bg-2:        #141414;
    --bg-3:        #1a1a1a;
    --bg-4:        #222222;
    --border:      #2a2a2a;
    --border-hi:   #3a3a3a;
    --text:        #f0ede8;
    --text-2:      #a09890;
    --text-3:      #6b6360;
    --gold:        #c9a96e;
    --gold-dim:    #8a6f42;
    --gold-glow:   rgba(201,169,110,.12);
    --red:         #e05252;
    --green:       #5bb891;
    --amber:       #e8973a;
    --radius:      6px;
    --radius-lg:   12px;
    --transition:  .2s cubic-bezier(.4,0,.2,1);
    --shadow:      0 4px 24px rgba(0,0,0,.5);
    --shadow-gold: 0 0 40px rgba(201,169,110,.15);
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  html { font-size: 16px; -webkit-font-smoothing: antialiased; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    font-weight: 300;
    min-height: 100vh;
    line-height: 1.6;
  }

  h1, h2, h3, h4 {
    font-family: 'Cormorant Garamond', serif;
    font-weight: 300;
    line-height: 1.15;
    letter-spacing: -.01em;
  }

  a { color: var(--gold); text-decoration: none; }
  a:hover { color: var(--text); }

  /* ── NAV ── */
  .nav {
    position: fixed; top: 0; left: 0; right: 0; z-index: 100;
    height: 60px;
    display: flex; align-items: center; justify-content: space-between;
    padding: 0 32px;
    background: rgba(13,13,13,.85);
    backdrop-filter: blur(12px);
    border-bottom: 1px solid var(--border);
  }
  .nav-brand {
    display: flex; align-items: center; gap: 10px;
    font-family: 'Cormorant Garamond', serif;
    font-size: 1.3rem;
    font-weight: 400;
    color: var(--text);
    letter-spacing: .03em;
  }
  .nav-brand-dot {
    width: 7px; height: 7px; border-radius: 50%;
    background: var(--gold);
    box-shadow: 0 0 8px var(--gold);
  }
  .nav-links { display: flex; align-items: center; gap: 24px; }
  .nav-links a {
    font-size: .82rem; font-weight: 400; letter-spacing: .08em;
    text-transform: uppercase; color: var(--text-2);
    transition: color var(--transition);
  }
  .nav-links a:hover, .nav-links a.active { color: var(--text); }
  .nav-links a.active { color: var(--gold); }

  /* ── BUTTONS ── */
  .btn {
    display: inline-flex; align-items: center; justify-content: center; gap: 8px;
    padding: 10px 22px;
    font-family: 'DM Sans', sans-serif; font-size: .82rem; font-weight: 400;
    letter-spacing: .07em; text-transform: uppercase;
    border-radius: var(--radius);
    cursor: pointer; border: none; transition: all var(--transition);
    text-decoration: none;
    white-space: nowrap;
  }
  .btn-primary {
    background: var(--gold); color: #0d0d0d;
    box-shadow: 0 2px 12px rgba(201,169,110,.3);
  }
  .btn-primary:hover {
    background: #d4b47a; color: #0d0d0d;
    box-shadow: 0 4px 20px rgba(201,169,110,.45);
    transform: translateY(-1px);
  }
  .btn-outline {
    background: transparent; color: var(--text);
    border: 1px solid var(--border-hi);
  }
  .btn-outline:hover {
    border-color: var(--gold); color: var(--gold);
    background: var(--gold-glow);
  }
  .btn-ghost {
    background: transparent; color: var(--text-2);
    border: 1px solid var(--border);
  }
  .btn-ghost:hover { color: var(--text); border-color: var(--border-hi); }
  .btn-danger {
    background: transparent; color: var(--red);
    border: 1px solid rgba(224,82,82,.25);
  }
  .btn-danger:hover { background: rgba(224,82,82,.1); }
  .btn-sm { padding: 7px 14px; font-size: .76rem; }
  .btn-lg { padding: 14px 32px; font-size: .88rem; }
  .btn:disabled { opacity: .45; cursor: not-allowed; pointer-events: none; }

  /* ── FORM ELEMENTS ── */
  .form-group { display: flex; flex-direction: column; gap: 6px; }
  .form-label {
    font-size: .75rem; font-weight: 400; letter-spacing: .1em;
    text-transform: uppercase; color: var(--text-3);
  }
  .form-input, .form-select, .form-textarea {
    width: 100%;
    background: var(--bg-3); border: 1px solid var(--border);
    color: var(--text); border-radius: var(--radius);
    padding: 11px 14px; font-family: 'DM Sans', sans-serif;
    font-size: .9rem; font-weight: 300;
    transition: border-color var(--transition), box-shadow var(--transition);
    outline: none;
  }
  .form-input:focus, .form-select:focus, .form-textarea:focus {
    border-color: var(--gold-dim); box-shadow: 0 0 0 3px var(--gold-glow);
  }
  .form-input::placeholder { color: var(--text-3); }
  .form-select { appearance: none; cursor: pointer; }
  .form-select option { background: var(--bg-3); }
  .form-textarea { resize: vertical; min-height: 90px; }
  .form-error {
    color: var(--red); font-size: .8rem; margin-top: 4px;
  }

  /* ── CARD ── */
  .card {
    background: var(--bg-2); border: 1px solid var(--border);
    border-radius: var(--radius-lg); padding: 24px;
  }
  .card-sm { padding: 16px; }
  .card-lg { padding: 32px; }

  /* ── BADGE ── */
  .badge {
    display: inline-flex; align-items: center; gap: 5px;
    padding: 3px 10px; border-radius: 100px;
    font-size: .72rem; font-weight: 400; letter-spacing: .05em;
  }
  .badge-gold { background: rgba(201,169,110,.15); color: var(--gold); }
  .badge-green { background: rgba(91,184,145,.15); color: var(--green); }
  .badge-red { background: rgba(224,82,82,.15); color: var(--red); }
  .badge-amber { background: rgba(232,151,58,.15); color: var(--amber); }
  .badge-muted { background: var(--bg-3); color: var(--text-3); }

  /* ── DIVIDER ── */
  .divider {
    border: none; border-top: 1px solid var(--border);
    margin: 24px 0;
  }

  /* ── ALERT ── */
  .alert {
    padding: 12px 16px; border-radius: var(--radius);
    font-size: .88rem; border-left: 3px solid;
  }
  .alert-error { background: rgba(224,82,82,.08); border-color: var(--red); color: var(--red); }
  .alert-success { background: rgba(91,184,145,.08); border-color: var(--green); color: var(--green); }
  .alert-warning { background: rgba(232,151,58,.08); border-color: var(--amber); color: var(--amber); }
  .alert-info { background: var(--gold-glow); border-color: var(--gold-dim); color: var(--gold); }

  /* ── PROGRESS ── */
  .progress-bar {
    width: 100%; height: 4px; background: var(--bg-4);
    border-radius: 100px; overflow: hidden;
  }
  .progress-fill {
    height: 100%; background: var(--gold);
    border-radius: 100px; transition: width .6s ease;
  }
  .progress-fill.danger { background: var(--red); }
  .progress-fill.warning { background: var(--amber); }

  /* ── TABLE ── */
  .data-table { width: 100%; border-collapse: collapse; }
  .data-table th {
    font-size: .72rem; font-weight: 400; letter-spacing: .1em;
    text-transform: uppercase; color: var(--text-3);
    padding: 10px 14px; border-bottom: 1px solid var(--border);
    text-align: left;
  }
  .data-table td {
    padding: 12px 14px; border-bottom: 1px solid var(--border);
    font-size: .88rem; color: var(--text-2);
  }
  .data-table tr:last-child td { border-bottom: none; }
  .data-table tr:hover td { background: var(--bg-3); color: var(--text); }

  /* ── MODAL ── */
  .modal-overlay {
    position: fixed; inset: 0; z-index: 200;
    background: rgba(0,0,0,.7); backdrop-filter: blur(4px);
    display: flex; align-items: center; justify-content: center;
    padding: 24px; opacity: 0; pointer-events: none;
    transition: opacity var(--transition);
  }
  .modal-overlay.open { opacity: 1; pointer-events: all; }
  .modal {
    background: var(--bg-2); border: 1px solid var(--border);
    border-radius: var(--radius-lg); padding: 32px;
    width: 100%; max-width: 480px;
    transform: translateY(12px); transition: transform var(--transition);
  }
  .modal-overlay.open .modal { transform: translateY(0); }
  .modal-header {
    display: flex; align-items: center; justify-content: space-between;
    margin-bottom: 24px;
  }
  .modal-title { font-size: 1.4rem; }
  .modal-close {
    width: 32px; height: 32px; border-radius: var(--radius);
    background: var(--bg-3); border: 1px solid var(--border);
    color: var(--text-2); cursor: pointer; font-size: 1.1rem;
    display: flex; align-items: center; justify-content: center;
    transition: all var(--transition);
  }
  .modal-close:hover { color: var(--text); border-color: var(--border-hi); }

  /* ── TOAST ── */
  #toast-container {
    position: fixed; bottom: 24px; right: 24px; z-index: 999;
    display: flex; flex-direction: column; gap: 8px;
  }
  .toast {
    display: flex; align-items: center; gap: 12px;
    padding: 12px 18px; border-radius: var(--radius);
    background: var(--bg-3); border: 1px solid var(--border);
    font-size: .85rem; color: var(--text);
    box-shadow: var(--shadow);
    animation: slideIn .25s ease forwards;
    min-width: 260px;
  }
  .toast.success { border-left: 3px solid var(--green); }
  .toast.error   { border-left: 3px solid var(--red); }
  .toast.info    { border-left: 3px solid var(--gold); }
  @keyframes slideIn { from { transform: translateX(20px); opacity: 0; } to { transform: translateX(0); opacity: 1; } }

  /* ── SCROLLBAR ── */
  ::-webkit-scrollbar { width: 6px; height: 6px; }
  ::-webkit-scrollbar-track { background: var(--bg); }
  ::-webkit-scrollbar-thumb { background: var(--bg-4); border-radius: 3px; }
  ::-webkit-scrollbar-thumb:hover { background: var(--border-hi); }

  /* ── LAYOUT ── */
  .page-body { padding-top: 60px; min-height: 100vh; }
  .container { max-width: 1200px; margin: 0 auto; padding: 0 24px; }
  .container-sm { max-width: 540px; margin: 0 auto; padding: 0 24px; }
  .container-md { max-width: 780px; margin: 0 auto; padding: 0 24px; }

  /* ── SIDEBAR LAYOUT (dashboard/crm) ── */
  .app-shell { display: flex; min-height: 100vh; padding-top: 60px; }
  .sidebar {
    width: 220px; flex-shrink: 0;
    background: var(--bg-2); border-right: 1px solid var(--border);
    position: fixed; top: 60px; bottom: 0; left: 0;
    overflow-y: auto; padding: 16px 0;
    display: flex; flex-direction: column;
  }
  .sidebar-section-label {
    font-size: .65rem; letter-spacing: .15em; text-transform: uppercase;
    color: var(--text-3); padding: 6px 20px; margin-top: 8px;
  }
  .sidebar-link {
    display: flex; align-items: center; gap: 10px;
    padding: 9px 20px; font-size: .84rem; color: var(--text-2);
    transition: all var(--transition); border-left: 2px solid transparent;
    text-decoration: none;
  }
  .sidebar-link:hover { color: var(--text); background: var(--bg-3); }
  .sidebar-link.active { color: var(--gold); border-left-color: var(--gold); background: var(--gold-glow); }
  .sidebar-link svg { width: 15px; height: 15px; flex-shrink: 0; }
  .main-content { margin-left: 220px; flex: 1; padding: 32px; }

  /* ── STAT CARD ── */
  .stat-card {
    background: var(--bg-2); border: 1px solid var(--border);
    border-radius: var(--radius-lg); padding: 20px;
    display: flex; flex-direction: column; gap: 6px;
  }
  .stat-label {
    font-size: .72rem; letter-spacing: .1em; text-transform: uppercase;
    color: var(--text-3); font-weight: 400;
  }
  .stat-value {
    font-family: 'Cormorant Garamond', serif;
    font-size: 2.2rem; font-weight: 300; color: var(--text);
    line-height: 1;
  }
  .stat-sub { font-size: .78rem; color: var(--text-3); }

  /* ── GRID HELPERS ── */
  .grid-2 { display: grid; grid-template-columns: repeat(2, 1fr); gap: 20px; }
  .grid-3 { display: grid; grid-template-columns: repeat(3, 1fr); gap: 20px; }
  .grid-4 { display: grid; grid-template-columns: repeat(4, 1fr); gap: 20px; }

  @media (max-width: 900px) {
    .sidebar { display: none; }
    .main-content { margin-left: 0; padding: 16px; }
    .grid-4 { grid-template-columns: repeat(2, 1fr); }
    .grid-3 { grid-template-columns: repeat(2, 1fr); }
  }
  @media (max-width: 600px) {
    .nav { padding: 0 16px; }
    .grid-2, .grid-3, .grid-4 { grid-template-columns: 1fr; }
    .main-content { padding: 12px; }
  }
</style>

<!-- Shared JS utilities -->
<script>
  function showToast(msg, type='info') {
    const c = document.getElementById('toast-container') || (() => {
      const d = document.createElement('div'); d.id = 'toast-container';
      document.body.appendChild(d); return d;
    })();
    const t = document.createElement('div');
    t.className = `toast ${type}`;
    const icons = { success: '✓', error: '✕', info: '◆' };
    t.innerHTML = `<span>${icons[type]||'◆'}</span><span>${msg}</span>`;
    c.appendChild(t);
    setTimeout(() => t.remove(), 3400);
  }

  function openModal(id) {
    document.getElementById(id).classList.add('open');
  }
  function closeModal(id) {
    document.getElementById(id).classList.remove('open');
  }

  // Close modal on overlay click
  document.addEventListener('click', e => {
    if (e.target.classList.contains('modal-overlay')) {
      e.target.classList.remove('open');
    }
  });
</script>
